<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
     <title>MBS | Muhammad Bin Saqib - Islamic-Accessories</title>
    <meta name="description" content="MBS (Muhammad Bin Saqib) Accessories - Premium collection of authentic Islamic accessories, Attars, Imamaas, Topis, and luxury Salah Rugs.">
    <meta name="keywords" content="MBS Accessories, Muhammad Bin Saqib, Islamic Accessories, Premium Attar, Kufi, Tasbeeh, Salah Rug, Pakistan">
    <meta name="author" content="MBS | Maaz Bin Ayyub">
    
    <!-- GOOGLE SEARCH CONSOLE -->
<meta name="google-site-verification" content="Y3F2S0IvVAeJmSNWqodDr8X-lKbVPPGqdBR3cSHmpYw" />
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('hero.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        .serif { font-family: 'Playfair Display', serif; }
        
        .main-container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        .logo-box img {
            width: 150px;
            margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5));
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        .gold-line {
            height: 1px;
            width: 80px;
            background: #C5A059;
            margin: 20px auto;
        }

        .contact-btn {
            background: transparent;
            border: 1px solid #C5A059;
            color: #C5A059;
            padding: 12px 30px;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.4s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }

        .contact-btn:hover {
            background: #C5A059;
            color: black;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Center Logo -->
        <div class="logo-box flex justify-center">
            <img src="logo.png" alt="MBS Logo">
        </div>

        <!-- Maintenance Content -->
        <h1 class="serif italic text-4xl md:text-6xl mb-4">Under Maintenance</h1>
        <p class="text-gray-400 uppercase tracking-[0.3em] text-[10px] md:text-xs font-light">Crafting a better experience for you</p>
        
        <div class="gold-line"></div>

        <p class="text-gray-300 text-sm md:text-base max-w-md mx-auto mb-6 leading-loose">
            Our online store is currently being upgraded with naye premium features. We will be back very soon.
        </p>

        <!-- Gmail Contact -->
        <div class="mt-8">
            <p class="text-[11px] text-gray-500 uppercase tracking-widest mb-2">For Queries & Orders</p>
            <a href="mailto:mbsislamicaccessories@gmail.com" class="contact-btn">
                <i class="fa fa-envelope mr-2"></i> Contact on Gmail
            </a>
        </div>

        <!-- Social Icons -->
        <div class="flex justify-center gap-6 mt-12 text-gray-500 text-xl">
            <a href="https://www.facebook.com/share/1ArXGBZq2e/" target="_blank" class="hover:text-[#C5A059] transition"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/923707107422" target="_blank" class="hover:text-[#C5A059] transition"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/mbs_islamic_accessories/" target="_blank" class="hover:text-[#C5A059] transition"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

</body>
</html>
